services:
  - type: web
    name: urlshortener
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --workers 4 --worker-tmp-dir /dev/shm --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-app.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-app.onrender.com
      - key: BASE_URL
        value: https://your-app.onrender.com
      - key: FRONTEND_URL
        value: https://your-app.onrender.com
