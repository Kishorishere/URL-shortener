<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-4">
        <div class="bg-white rounded-xl shadow-md border border-gray-200 p-8">
            {% if sent %}
                <div class="text-center">
                    <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-gray-100 mb-4">
                        <svg class="h-6 w-6 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900">Check your email</h1>
                    <p class="mt-4 text-sm text-gray-500">If an account with that email exists, we've sent a password reset link.</p>
                    <a href="{% url 'login_page' %}" class="mt-6 inline-block text-sm font-medium text-gray-700 hover:text-gray-500">
                        Back to sign in
                    </a>
                </div>
            {% else %}
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-gray-900">Forgot password?</h1>
                    <p class="mt-2 text-sm text-gray-500">Enter your email and we'll send you a reset link.</p>
                </div>

                {% if error %}
                    <div class="mb-4 p-3 rounded bg-red-100 text-red-700 border border-red-200 text-sm">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" name="email" id="email" required
                                class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500">


                    </div>
                    <button type="submit"
                             class="w-full rounded-lg bg-gray-700 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-800">
                        Send reset link
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-gray-500">
                    <a href="{% url 'login_page' %}" class="font-medium text-gray-700 hover:text-gray-500">Back to sign in</a>
                </p>
            {% endif %}
        </div>
    </div>
</body>
</html>
