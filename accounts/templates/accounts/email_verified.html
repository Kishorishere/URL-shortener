<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified — URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-4">
        <div class="bg-white rounded-xl shadow-md border border-gray-200 p-8 text-center">
            {% if success %}
                <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-green-100 mb-4">
                    <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Email verified!</h1>
                <p class="mt-2 text-sm text-gray-500">Your email has been successfully verified.</p>
                <a href="{% url 'login_page' %}"
                   class="mt-6 inline-block rounded-lg bg-gray-700 px-6 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-800">
                    Sign in
                </a>
            {% else %}
                <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-100 mb-4">
                    <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Verification failed</h1>
                <p class="mt-2 text-sm text-gray-500">{{ message }}</p>
                <a href="{% url 'login_page' %}"
                   class="mt-6 inline-block rounded-lg bg-gray-700 px-6 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-800">
                    Go to sign in
                </a>
            {% endif %}
        </div>
    </div>
</body>
</html>
