<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md mx-4">
        <div class="bg-white rounded-xl shadow-md border border-gray-200 p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900">Set new password</h1>
                <p class="mt-2 text-sm text-gray-500">Choose a new password for your account.</p>
            </div>

            {% if not valid %}
                <div class="text-center">
                    <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-100 mb-4">
                        <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-900">Invalid or expired link</h2>
                    <p class="mt-2 text-sm text-gray-500">This password reset link is no longer valid.</p>
                    <a href="{% url 'forgot_password_page' %}" class="mt-6 inline-block text-sm font-medium text-gray-700 hover:text-gray-500">
                        Request a new reset link
                    </a>
                </div>
            {% else %}
                {% if error %}
                    <div class="mb-4 p-3 rounded bg-red-100 text-red-700 border border-red-200 text-sm">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">New password</label>
                        <input type="password" name="password" id="password" required minlength="8"
                               class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500">
                    </div>
                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm password</label>
                        <input type="password" name="confirm_password" id="confirm_password" required minlength="8"
                               class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-gray-500 focus:ring-1 focus:ring-gray-500">
                    </div>
                    <button type="submit"
                             class="w-full rounded-lg bg-gray-700 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-gray-800">
                        Reset password
                    </button>
                </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
