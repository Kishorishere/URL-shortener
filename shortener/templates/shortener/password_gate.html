<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Required</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded shadow p-8 max-w-sm w-full">
        <h1 class="text-xl font-bold mb-4 text-center">Password Required</h1>
        <p class="text-gray-500 text-sm text-center mb-6">This link is password protected.</p>
        <form method="post">
            {% csrf_token %}
            <input type="password" name="password" placeholder="Enter password" required
                   class="w-full p-2 border rounded mb-4">
            {% if error %}
            <p class="text-red-500 text-sm mb-4">{{ error }}</p>
            {% endif %}
            <button type="submit" class="w-full bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-800">Unlock</button>
        </form>
    </div>
</body>
</html>
