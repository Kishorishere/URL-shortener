{% extends "shortener/base.html" %}
{% block title %}Restore /{{ url.active_code }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded shadow p-6 text-center">
    <h1 class="text-xl font-bold mb-3">Restore this link?</h1>
    <p class="text-gray-500 mb-2 font-mono text-sm">/{{ url.active_code }}</p>
    <p class="text-gray-400 text-sm mb-6">{{ url.original_url|truncatechars:60 }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Yes, restore</button>
        <a href="{% url 'shortener:dashboard_trash' %}" class="ml-3 px-6 py-2 border rounded hover:bg-gray-50">Cancel</a>
    </form>
</div>
{% endblock %}
