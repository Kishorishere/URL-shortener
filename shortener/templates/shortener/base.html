<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}URL Shortener{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{% url 'shortener:dashboard_list' %}" class="text-xl font-bold text-gray-900">URLShortener</a>
            <div class="flex items-center gap-4 text-sm">
                <a href="{% url 'shortener:dashboard_list' %}" class="text-gray-600 hover:text-gray-900">My Links</a>
                <a href="{% url 'shortener:dashboard_create' %}" class="text-gray-600 hover:text-gray-900">New Link</a>
                <a href="{% url 'shortener:dashboard_bulk' %}" class="text-gray-600 hover:text-gray-900">Bulk</a>
                <a href="{% url 'shortener:dashboard_trash' %}" class="text-gray-600 hover:text-gray-900">Trash</a>
                {% if user.is_authenticated %}
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-500">{{ user.email }}</span>
                    <form method="post" action="{% url 'accounts:logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-gray-500 hover:text-red-700">Logout</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded bg-green-100 text-green-800 border border-green-200">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
