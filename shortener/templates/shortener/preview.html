<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta http-equiv="refresh" content="5;url={{ url.original_url }}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded shadow p-8 max-w-lg text-center">
        <h1 class="text-xl font-bold mb-2">You are being redirected</h1>
        <p class="text-gray-500 text-sm mb-1">This link will take you to:</p>
        <p class="text-gray-700 font-medium break-all mb-4">{{ url.original_url }}</p>
        <a href="{{ url.original_url }}" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-gray-800 inline-block">Continue</a>
        <p class="text-gray-400 text-xs mt-3">Redirecting automatically in 5 seconds...</p>
    </div>
</body>
</html>
